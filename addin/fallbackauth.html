<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Signing in&hellip;</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="msal-browser.min.js"></script>
</head>
<body>
  <pre id="status" style="font-family: sans-serif; font-size: 14px; color: #444; padding: 16px; white-space: pre-wrap;">Starting&hellip;</pre>
  <script>
    // Runs inside an Office dialog opened by the task pane. MSAL does an
    // interactive redirect here (a real window, so it's not blocked), then we
    // hand the access token back to the pane via messageParent.
    var statusEl = document.getElementById("status");
    function show(t) { statusEl.textContent = t; }

    var MSAL_CONFIG = {
      auth: {
        clientId: "6373ddfb-fa04-41a7-9053-e8111df6ad9d",
        authority: "https://login.microsoftonline.com/consumers",
        redirectUri: "https://email-mvp-roan.vercel.app/addin/fallbackauth.html",
      },
      cache: { cacheLocation: "localStorage" },
    };
    var SCOPES = ["Mail.ReadWrite", "MailboxSettings.ReadWrite"];

    function sendToParent(obj) {
      Office.onReady(function () {
        try { Office.context.ui.messageParent(JSON.stringify(obj)); }
        catch (e) { show("messageParent failed: " + ((e && e.message) || e)); }
      });
    }

    // On error: show it on screen, keep the dialog open ~10s so it can be read,
    // then notify the pane.
    function fail(stage, e) {
      var msg = (e && (e.errorCode ? e.errorCode + ": " : "") + (e.message || e.errorMessage)) || String(e);
      show("ERROR at " + stage + ":\n\n" + msg + "\n\n(this window closes in 10s)");
      setTimeout(function () { sendToParent({ error: stage + ": " + msg }); }, 10000);
    }

    try {
      var pca = new msal.PublicClientApplication(MSAL_CONFIG);
      show("Checking sign-in…");
      pca.handleRedirectPromise().then(function (resp) {
        if (resp && resp.accessToken) {
          show("Signed in. Returning to add-in…");
          sendToParent({ token: resp.accessToken });
          return;
        }
        var account = pca.getAllAccounts()[0];
        if (account) {
          show("Refreshing token…");
          pca.acquireTokenSilent({ scopes: SCOPES, account: account })
            .then(function (r) { sendToParent({ token: r.accessToken }); })
            .catch(function () {
              show("Redirecting to Microsoft sign-in…");
              pca.loginRedirect({ scopes: SCOPES }).catch(function (e) { fail("loginRedirect", e); });
            });
        } else {
          show("Redirecting to Microsoft sign-in…");
          pca.loginRedirect({ scopes: SCOPES }).catch(function (e) { fail("loginRedirect", e); });
        }
      }).catch(function (e) { fail("handleRedirectPromise", e); });
    } catch (e) {
      fail("init", e);
    }
  </script>
</body>
</html>
