<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advise Assist</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <span class="brand-mark" aria-hidden="true"></span>
      <div class="brand-text">
        <h1>Advise Assist</h1>
        <p class="subtitle">UTK Policy Lookup</p>
      </div>
    </header>

    <!-- Categorize Inbox action -->
    <div id="categorize-section">
      <button id="categorizeInboxBtn" type="button" class="btn-categorize">
        Categorize Inbox
      </button>

      <div id="categorize-loading" class="hidden">
        <div class="skeleton skeleton-pills"></div>
        <div class="skeleton skeleton-card" style="height:60px"></div>
        <p class="loading-text">Categorizing inbox&hellip;</p>
      </div>

      <div id="categorize-error" class="hidden cat-error"></div>

      <div id="categorize-results" class="hidden">
        <div id="categorize-summary"></div>
        <p class="cat-applied">&#10003; Outlook categories applied</p>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Loading skeleton -->
    <div id="loading" class="state">
      <div class="skeleton skeleton-banner"></div>
      <div class="skeleton skeleton-card"></div>
      <p class="loading-text">Analyzing email&hellip;</p>
    </div>

    <!-- Result -->
    <div id="result" class="hidden">
      <div id="statusBanner" class="banner"><span id="statusText"></span></div>

      <div class="pills">
        <span id="categoryBadge" class="badge badge-cat"></span>
        <span id="urgencyBadge" class="badge"></span>
      </div>

      <section id="darsCard" class="card card-dars hidden">
        <p class="card-label">Student record &middot; used</p>
        <p id="darsLine1"></p>
        <p id="darsLine2"></p>
      </section>

      <section id="draftSection" class="hidden">
        <p class="card-label">Draft reply</p>
        <div id="draftText" class="draft-box"></div>
      </section>

      <section id="checklistSection" class="card card-checklist hidden">
        <p class="card-label">Before sending &mdash; check:</p>
        <ul id="checklistItems"></ul>
      </section>

      <button id="insertBtn" type="button" class="btn-primary hidden">Insert into reply</button>

      <section id="policySection" class="card hidden">
        <p class="card-label">Policy (reference)</p>
        <p id="policyText"></p>
        <a id="policyLink" href="#" target="_blank" rel="noopener" class="link">View UTK policy &rarr;</a>
      </section>

      <div id="noDraftNote" class="note hidden">No auto-draft &mdash; this one needs your judgment.</div>

      <div id="feedback" class="feedback">
        <span class="feedback-q">Was this helpful?</span>
        <button id="thumbUp" type="button" class="thumb" aria-label="Helpful">&#128077;</button>
        <button id="thumbDown" type="button" class="thumb" aria-label="Not helpful">&#128078;</button>
      </div>
    </div>

    <!-- Error -->
    <div id="error" class="hidden state"></div>
  </div>
  <script src="taskpane.js"></script>
</body>
</html>
