<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Client-side scrubber — PoC harness</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; height: 140px; font-family: monospace; font-size: 13px; }
    .out { white-space: pre-wrap; background: #f4f4f5; border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-top: 8px; font-family: monospace; font-size: 13px; }
    .timing { color: #555; font-size: 13px; margin: 8px 0; }
    button { padding: 8px 16px; font-size: 14px; cursor: pointer; }
    h3 { margin-bottom: 4px; }
    mark { background: #ffe08a; }
  </style>
</head>
<body>
  <h2>Client-side PII scrubber — proof of concept</h2>
  <p>Loads <code>Xenova/bert-base-NER</code> via transformers.js. Watch the
     <b>model load</b> timing on first run — that's the number that decides
     whether this is viable inside the Outlook webview.</p>

  <textarea id="input">Hi, I'm Jane Smith and my advisor is Dr. Robert Lee in the Math Department. My student ID is 123456789, email jane.smith@vols.utk.edu, cell (865) 555-1234. My GPA dropped to 1.8 after I got a 45/100 in CHEM 101. The drop deadline is 3/15/2025. I was born 04/12/2003.</textarea>

  <p>
    <button id="regexBtn">Regex only (instant)</button>
    <button id="fullBtn">Full scrub (regex + NER)</button>
  </p>

  <div class="timing" id="timing"></div>

  <h3>Output</h3>
  <div class="out" id="output">—</div>

  <script type="module">
    import { scrubRegex, scrubPII, initNER } from "./scrub_client.js";

    const $ = (id) => document.getElementById(id);
    const input = $("input");
    const out = $("output");
    const timing = $("timing");
    let modelLoaded = false;

    function show(text) {
      // Highlight the [TOKENS] so redactions are easy to spot.
      out.innerHTML = text.replace(/\[[^\]]+\]/g, (m) => `<mark>${m}</mark>`);
    }

    $("regexBtn").onclick = () => {
      const t0 = performance.now();
      const result = scrubRegex(input.value);
      timing.textContent = `Regex: ${(performance.now() - t0).toFixed(1)} ms`;
      show(result);
    };

    $("fullBtn").onclick = async () => {
      timing.textContent = modelLoaded
        ? "Running NER…"
        : "Downloading model (first run, ~100MB)…";

      const loadStart = performance.now();
      if (!modelLoaded) {
        await initNER();
        modelLoaded = true;
      }
      const loadMs = performance.now() - loadStart;

      const inferStart = performance.now();
      const result = await scrubPII(input.value);
      const inferMs = performance.now() - inferStart;

      timing.textContent =
        `Model load: ${loadMs.toFixed(0)} ms` +
        ` | inference: ${inferMs.toFixed(0)} ms`;
      show(result);
    };
  </script>
</body>
</html>
